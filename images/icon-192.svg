<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E84B7E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="192" height="192" fill="url(#iconGrad)" rx="40"/>
  
  <!-- Car silhouette -->
  <g transform="translate(48, 60)">
    <rect x="15" y="25" width="80" height="40" rx="5" fill="white" opacity="0.9"/>
    <polygon points="25,25 75,25 70,10 30,10" fill="white" opacity="0.9"/>
    <!-- Circle windows -->
    <circle cx="35" cy="18" r="8" fill="#FF6B9D" opacity="0.3"/>
    <circle cx="65" cy="18" r="8" fill="#FF6B9D" opacity="0.3"/>
    <!-- Wheels -->
    <circle cx="30" cy="65" r="12" fill="white" opacity="0.9"/>
    <circle cx="80" cy="65" r="12" fill="white" opacity="0.9"/>
  </g>
</svg>