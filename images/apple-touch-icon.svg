<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E84B7E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="180" height="180" fill="url(#appleGrad)" rx="40"/>
  
  <!-- Stylized taxi -->
  <g transform="translate(30, 45)">
    <!-- Car body -->
    <rect x="12" y="32" width="88" height="48" rx="5" fill="white" opacity="0.95"/>
    <!-- Roof -->
    <polygon points="28,32 88,32 83,15 33,15" fill="white" opacity="0.95"/>
    <!-- Windows -->
    <rect x="38" y="20" width="18" height="14" fill="#FF6B9D" opacity="0.3" rx="2"/>
    <rect x="65" y="20" width="18" height="14" fill="#FF6B9D" opacity="0.3" rx="2"/>
    <!-- Wheels -->
    <circle cx="32" cy="83" r="13" fill="white" opacity="0.95"/>
    <circle cx="80" cy="83" r="13" fill="white" opacity="0.95"/>
    <!-- Wheel details -->
    <circle cx="32" cy="83" r="7" fill="#FF6B9D"/>
    <circle cx="80" cy="83" r="7" fill="#FF6B9D"/>
  </g>
  
  <!-- Herway text -->
  <text x="90" y="130" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Herway</text>
</svg>