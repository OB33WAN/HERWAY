<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="largeIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E84B7E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#largeIconGrad)" rx="100"/>
  
  <!-- Stylized H for Herway -->
  <g transform="translate(100, 80)">
    <!-- Left vertical line -->
    <rect x="20" y="0" width="40" height="280" fill="white" rx="10"/>
    <!-- Right vertical line -->
    <rect x="200" y="0" width="40" height="280" fill="white" rx="10"/>
    <!-- Horizontal bar -->
    <rect x="20" y="120" width="220" height="40" fill="white" rx="10"/>
    
    <!-- Small taxi icon on bottom -->
    <g transform="translate(180, 180)">
      <rect x="0" y="20" width="80" height="40" rx="4" fill="white" opacity="0.8"/>
      <polygon points="10,20 70,20 65,8 15,8" fill="white" opacity="0.8"/>
      <circle cx="20" cy="62" r="8" fill="white" opacity="0.8"/>
      <circle cx="60" cy="62" r="8" fill="white" opacity="0.8"/>
    </g>
  </g>
</svg>