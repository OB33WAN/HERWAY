<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#skyGrad6)"/>
  
  <!-- Cottage -->
  <rect x="200" y="300" width="400" height="250" fill="#f5f5f5" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Roof -->
  <polygon points="400,180 140,300 660,300" fill="#c9a961" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Chimney -->
  <rect x="500" y="200" width="50" height="100" fill="#1a3a52" stroke="#1a3a52" stroke-width="2"/>
  <rect x="490" y="190" width="70" height="20" fill="#1a3a52"/>
  
  <!-- Windows with shutters -->
  <rect x="260" y="350" width="80" height="90" fill="#2c5f7f" opacity="0.7" stroke="#1a3a52" stroke-width="2"/>
  <rect x="460" y="350" width="80" height="90" fill="#2c5f7f" opacity="0.7" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Door -->
  <rect x="360" y="410" width="80" height="140" fill="#c9a961" stroke="#1a3a52" stroke-width="2"/>
  <circle cx="420" cy="480" r="5" fill="#1a3a52"/>
  
  <!-- Garden path -->
  <path d="M 400 550 L 380 600" stroke="#1a3a52" stroke-width="40" opacity="0.3"/>
  <path d="M 400 550 L 420 600" stroke="#1a3a52" stroke-width="40" opacity="0.3"/>
  
  <!-- Ground -->
  <rect x="0" y="550" width="800" height="50" fill="#1a3a52" opacity="0.3"/>
  
  <!-- Property ID Text -->
  <text x="400" y="580" text-anchor="middle" font-family="Playfair Display, serif" font-size="24" fill="#c9a961" font-weight="600">Luxury Cottage</text>
</svg>