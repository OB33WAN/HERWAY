<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5f7f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a52;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#skyGrad3)"/>
  
  <!-- Penthouse Building -->
  <rect x="180" y="100" width="440" height="450" fill="#e0e0e0" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Balconies -->
  <rect x="180" y="200" width="440" height="80" fill="#f5f5f5" stroke="#1a3a52" stroke-width="2"/>
  <rect x="180" y="350" width="440" height="80" fill="#f5f5f5" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Windows Grid -->
  <rect x="220" y="250" width="60" height="80" fill="#2c5f7f" opacity="0.7"/>
  <rect x="300" y="250" width="60" height="80" fill="#2c5f7f" opacity="0.7"/>
  <rect x="380" y="250" width="60" height="80" fill="#2c5f7f" opacity="0.7"/>
  <rect x="460" y="250" width="60" height="80" fill="#2c5f7f" opacity="0.7"/>
  <rect x="540" y="250" width="60" height="80" fill="#2c5f7f" opacity="0.7"/>
  
  <rect x="220" y="400" width="60" height="80" fill="#2c5f7f" opacity="0.7"/>
  <rect x="300" y="400" width="60" height="80" fill="#2c5f7f" opacity="0.7"/>
  <rect x="380" y="400" width="60" height="80" fill="#2c5f7f" opacity="0.7"/>
  <rect x="460" y="400" width="60" height="80" fill="#2c5f7f" opacity="0.7"/>
  <rect x="540" y="400" width="60" height="80" fill="#2c5f7f" opacity="0.7"/>
  
  <!-- Entrance -->
  <rect x="350" y="480" width="100" height="70" fill="#c9a961" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Ground -->
  <rect x="0" y="550" width="800" height="50" fill="#1a3a52" opacity="0.3"/>
  
  <!-- Property ID Text -->
  <text x="400" y="580" text-anchor="middle" font-family="Playfair Display, serif" font-size="24" fill="#c9a961" font-weight="600">Penthouse</text>
</svg>