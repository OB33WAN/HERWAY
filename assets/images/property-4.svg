<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#skyGrad4)"/>
  
  <!-- Mansion Base -->
  <rect x="100" y="280" width="600" height="270" fill="#f5f5f5" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Central Tower -->
  <rect x="320" y="180" width="160" height="370" fill="#e0e0e0" stroke="#1a3a52" stroke-width="2"/>
  <polygon points="400,140 280,180 520,180" fill="#1a3a52" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Side Wings -->
  <rect x="120" y="300" width="180" height="200" fill="#e8e8e8" stroke="#1a3a52" stroke-width="2"/>
  <rect x="500" y="300" width="180" height="200" fill="#e8e8e8" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Windows -->
  <rect x="350" y="230" width="40" height="60" fill="#2c5f7f" opacity="0.7"/>
  <rect x="410" y="230" width="40" height="60" fill="#2c5f7f" opacity="0.7"/>
  <rect x="350" y="310" width="40" height="60" fill="#2c5f7f" opacity="0.7"/>
  <rect x="410" y="310" width="40" height="60" fill="#2c5f7f" opacity="0.7"/>
  
  <!-- Grand Entrance -->
  <rect x="360" y="450" width="80" height="100" fill="#c9a961" stroke="#1a3a52" stroke-width="2"/>
  <circle cx="410" cy="500" r="6" fill="#1a3a52"/>
  
  <!-- Ground -->
  <rect x="0" y="550" width="800" height="50" fill="#1a3a52" opacity="0.3"/>
  
  <!-- Property ID Text -->
  <text x="400" y="580" text-anchor="middle" font-family="Playfair Display, serif" font-size="24" fill="#c9a961" font-weight="600">Mansion</text>
</svg>