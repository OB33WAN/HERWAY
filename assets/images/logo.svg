<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#logoGrad)"/>
  
  <!-- Diamond Icon (◆) -->
  <g transform="translate(256, 256)">
    <polygon points="0,-100 80,0 0,100 -80,0" fill="#c9a961" stroke="#f5f5f5" stroke-width="4"/>
    <polygon points="0,-70 50,0 0,70 -50,0" fill="#f5f5f5" opacity="0.3"/>
  </g>
  
  <!-- Subtle Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#c9a961" stroke-width="2" opacity="0.5"/>
</svg>