<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="ogGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogGrad)"/>
  
  <!-- Diamond Logo -->
  <g transform="translate(220, 315)">
    <polygon points="0,-80 60,0 0,80 -60,0" fill="#c9a961" stroke="#f5f5f5" stroke-width="3"/>
    <polygon points="0,-50 38,0 0,50 -38,0" fill="#f5f5f5" opacity="0.3"/>
  </g>
  
  <!-- Brand Text -->
  <text x="350" y="300" font-family="Playfair Display, serif" font-size="72" fill="#f5f5f5" font-weight="600">Curated Experiences</text>
  <text x="350" y="360" font-family="Inter, sans-serif" font-size="32" fill="#c9a961">Luxury Property Tours & Estate Booking</text>
  
  <!-- Decorative Elements -->
  <circle cx="1050" cy="150" r="80" fill="#c9a961" opacity="0.1"/>
  <circle cx="950" cy="480" r="100" fill="#c9a961" opacity="0.08"/>
  <rect x="320" y="400" width="500" height="2" fill="#c9a961" opacity="0.5"/>
</svg>