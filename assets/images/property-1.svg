<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5f7f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a52;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#skyGrad1)"/>
  
  <!-- Building -->
  <rect x="200" y="250" width="400" height="300" fill="#f5f5f5" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Roof -->
  <polygon points="400,200 150,250 650,250" fill="#1a3a52" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Windows -->
  <rect x="250" y="300" width="80" height="100" fill="#2c5f7f" stroke="#1a3a52" stroke-width="2"/>
  <rect x="360" y="300" width="80" height="100" fill="#2c5f7f" stroke="#1a3a52" stroke-width="2"/>
  <rect x="470" y="300" width="80" height="100" fill="#2c5f7f" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Door -->
  <rect x="350" y="420" width="100" height="130" fill="#c9a961" stroke="#1a3a52" stroke-width="2"/>
  <circle cx="420" cy="485" r="5" fill="#1a3a52"/>
  
  <!-- Ground -->
  <rect x="0" y="550" width="800" height="50" fill="#1a3a52" opacity="0.3"/>
  
  <!-- Property ID Text -->
  <text x="400" y="580" text-anchor="middle" font-family="Playfair Display, serif" font-size="24" fill="#c9a961" font-weight="600">Luxury Villa</text>
</svg>