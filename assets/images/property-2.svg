<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#skyGrad2)"/>
  
  <!-- Modern Building -->
  <rect x="150" y="200" width="500" height="350" fill="#f5f5f5" stroke="#1a3a52" stroke-width="2"/>
  <rect x="250" y="150" width="300" height="400" fill="#e0e0e0" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Glass Windows -->
  <rect x="270" y="180" width="80" height="120" fill="#2c5f7f" opacity="0.6"/>
  <rect x="370" y="180" width="80" height="120" fill="#2c5f7f" opacity="0.6"/>
  <rect x="270" y="320" width="80" height="120" fill="#2c5f7f" opacity="0.6"/>
  <rect x="370" y="320" width="80" height="120" fill="#2c5f7f" opacity="0.6"/>
  <rect x="470" y="180" width="60" height="280" fill="#2c5f7f" opacity="0.6"/>
  
  <!-- Entrance -->
  <rect x="180" y="450" width="120" height="100" fill="#c9a961" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Ground -->
  <rect x="0" y="550" width="800" height="50" fill="#1a3a52" opacity="0.3"/>
  
  <!-- Property ID Text -->
  <text x="400" y="580" text-anchor="middle" font-family="Playfair Display, serif" font-size="24" fill="#c9a961" font-weight="600">Modern Estate</text>
</svg>