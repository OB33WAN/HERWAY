<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c5f7f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a52;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#heroGrad)"/>
  
  <!-- Luxury Villa Silhouette -->
  <rect x="150" y="250" width="500" height="280" fill="#f5f5f5" opacity="0.1"/>
  <polygon points="400,180 100,250 700,250" fill="#c9a961" opacity="0.2"/>
  
  <!-- Windows Grid (Subtle) -->
  <rect x="200" y="300" width="60" height="80" fill="#c9a961" opacity="0.15"/>
  <rect x="290" y="300" width="60" height="80" fill="#c9a961" opacity="0.15"/>
  <rect x="380" y="300" width="60" height="80" fill="#c9a961" opacity="0.15"/>
  <rect x="470" y="300" width="60" height="80" fill="#c9a961" opacity="0.15"/>
  <rect x="560" y="300" width="60" height="80" fill="#c9a961" opacity="0.15"/>
  
  <!-- Grand Entrance -->
  <rect x="360" y="420" width="80" height="110" fill="#c9a961" opacity="0.3"/>
  
  <!-- Diamond Logo Overlay -->
  <g transform="translate(400, 120)">
    <polygon points="0,-40 30,0 0,40 -30,0" fill="#c9a961" opacity="0.9"/>
    <polygon points="0,-25 18,0 0,25 -18,0" fill="#f5f5f5" opacity="0.4"/>
  </g>
  
  <!-- Brand Text -->
  <text x="400" y="560" text-anchor="middle" font-family="Playfair Display, serif" font-size="42" fill="#c9a961" font-weight="600">Curated Experiences</text>
  <text x="400" y="585" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#f5f5f5" opacity="0.8">Luxury Real Estate</text>
</svg>